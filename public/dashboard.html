<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tennis Predictions Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        margin-bottom: 20px;
    }
    .match {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .players {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 8px;
    }
    .tournament {
        color: #666;
        margin-bottom: 10px;
    }
    .value {
        padding: 8px;
        border-radius: 6px;
        margin-top: 10px;
        font-weight: bold;
    }
    .value-good {
        background: #d4f8d4;
        color: #0a7a0a;
    }
    .value-bad {
        background: #ffe0e0;
        color: #a00000;
    }
</style>
</head>
<body>

<h1>Tennis Predictions</h1>

<div id="content">Loading...</div>

<script>
async function loadData() {
    const today = new Date().toISOString().split("T")[0];
    const url = `predictions_${today}.json`;

    try {
        const response = await fetch(url);
        const data = await response.json();

        const container = document.getElementById("content");
        container.innerHTML = "";

        data.forEach(p => {
            const div = document.createElement("div");
            div.className = "match";

            const vb1 = p.value_player1;
            const vb2 = p.value_player2;

            let vbHtml = "";

            if (vb1 && vb1.is_value_bet) {
                vbHtml += `<div class="value value-good">
                    VALUE BET: ${p.player1} (value ${vb1.value.toFixed(3)}, odds ${vb1.odds})
                </div>`;
            }
            if (vb2 && vb2.is_value_bet) {
                vbHtml += `<div class="value value-good">
                    VALUE BET: ${p.player2} (value ${vb2.value.toFixed(3)}, odds ${vb2.odds})
                </div>`;
            }

            if (!vbHtml) {
                vbHtml = `<div class="value value-bad">No value bet</div>`;
            }

            div.innerHTML = `
                <div class="players">${p.player1} vs ${p.player2}</div>
                <div class="tournament">${p.tournament}</div>
                <div>Probabilities: ${p.prob_player1.toFixed(2)} / ${p.prob_player2.toFixed(2)}</div>
                ${vbHtml}
            `;

            container.appendChild(div);
        });

    } catch (e) {
        document.getElementById("content").innerHTML = "No data available.";
    }
}

loadData();
</script>

</body>
</html>
