name: Daily Tennis Predictions

on:
  schedule:
    - cron: "0 4 * * *"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Clean public folder
        run: |
          rm -rf public
          mkdir -p public

      - name: Run predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
          BET_WINDOW_START_HOUR: 6
          BET_WINDOW_END_NEXT_DAY_HOUR: 6
        run: python update.py

      - name: Generate TOP page and TOP RSS
        run: python rss.py

      - name: Generate ALL page and ALL RSS
        run: python rss_all.py

      - name: Verify generated files
        run: |
          echo "===== PUBLIC FILES ====="
          ls -R public

          echo "===== CHECK TOP JSON ====="
          TOP_JSON=$(ls public/predictions_*.json | head -n 1)
          TOP_COUNT=$(python -c "import json; print(len(json.load(open('$TOP_JSON', encoding='utf-8'))))")
          echo "TOP_COUNT=$TOP_COUNT"

          if [ "$TOP_COUNT" -gt 7 ]; then
            echo "ERROR: TOP predictions has more than 7 items"
            exit 1
          fi

          echo "===== CHECK ALL JSON ====="
          ALL_JSON=$(ls public/all_predictions_*.json | head -n 1)
          ALL_COUNT=$(python -c "import json; print(len(json.load(open('$ALL_JSON', encoding='utf-8'))))")
          echo "ALL_COUNT=$ALL_COUNT"

          echo "===== CHECK TOP PAGE ====="
          if [ ! -f public/index.html ]; then
            echo "ERROR: public/index.html missing"
            exit 1
          fi

          if grep -q "RSS ALL" public/index.html; then
            echo "ERROR: TOP root page contains RSS ALL"
            exit 1
          fi

          echo "===== CHECK TOP RSS ====="
          if [ ! -f public/tennis.xml ]; then
            echo "ERROR: public/tennis.xml missing"
            exit 1
          fi

          TOP_RSS_COUNT=$(grep -c "<item>" public/tennis.xml || true)
          echo "TOP_RSS_COUNT=$TOP_RSS_COUNT"

          if [ "$TOP_RSS_COUNT" -gt 7 ]; then
            echo "ERROR: TOP RSS has more than 7 items"
            exit 1
          fi

          echo "===== CHECK ALL PAGE ====="
          if [ ! -f public/all/index.html ]; then
            echo "ERROR: public/all/index.html missing"
            exit 1
          fi

          echo "===== CHECK ALL RSS ====="
          if [ ! -f public/tennis_all.xml ]; then
            echo "ERROR: public/tennis_all.xml missing"
            exit 1
          fi

          ALL_RSS_COUNT=$(grep -c "<item>" public/tennis_all.xml || true)
          echo "ALL_RSS_COUNT=$ALL_RSS_COUNT"

          echo "===== TOP INDEX PREVIEW ====="
          head -n 40 public/index.html

          echo "===== ALL INDEX PREVIEW ====="
          head -n 40 public/all/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
