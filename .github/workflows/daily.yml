name: Daily Tennis Predictions

on:
  schedule:
    # GitHub Actions cron beží v UTC.
    # Pri LOCAL_TZ_OFFSET_HOURS=2:
    # 04:00 UTC ≈ 06:00 CET/CEST lokálne podľa nášho labelu v systéme.
    - cron: "0 4 * * *"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
          BET_WINDOW_START_HOUR: 6
          BET_WINDOW_END_NEXT_DAY_HOUR: 6
        run: python update.py

      - name: Generate TOP RSS
        run: python rss.py

      - name: Generate RSS ALL
        run: python rss_all.py

      - name: Verify generated files
        run: |
          echo "===== PUBLIC FILES ====="
          ls -R public

          echo "===== CHECK TOP RSS ====="
          if [ ! -f public/tennis.xml ]; then
            echo "ERROR: public/tennis.xml was not generated"
            exit 1
          fi

          echo "===== CHECK RSS ALL ====="
          if [ ! -f public/tennis_all.xml ]; then
            echo "ERROR: public/tennis_all.xml was not generated"
            exit 1
          fi

          echo "===== CHECK TOP INDEX PAGE ====="
          if [ ! -f public/index.html ]; then
            echo "ERROR: public/index.html was not generated"
            exit 1
          fi

          echo "===== CHECK ALL INDEX PAGE ====="
          if [ ! -f public/all/index.html ]; then
            echo "ERROR: public/all/index.html was not generated"
            exit 1
          fi

          echo "===== TOP RSS PREVIEW ====="
          head -n 80 public/tennis.xml

          echo "===== RSS ALL PREVIEW ====="
          head -n 80 public/tennis_all.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
