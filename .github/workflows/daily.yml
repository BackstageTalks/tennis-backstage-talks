name: Daily Tennis Predictions

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run predictions
        env:
          BET_WINDOW_HOURS: 24
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python update.py

      - name: Generate RSS
        run: python rss.py

      - name: Verify RSS exists
        run: |
          echo "===== PUBLIC FILES ====="
          ls -R public

          echo "===== CHECK tennis.xml ====="
          if [ ! -f public/tennis.xml ]; then
            echo "ERROR: public/tennis.xml was not generated"
            exit 1
          fi

          echo "===== TENNIS XML ====="
          cat public/tennis.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
