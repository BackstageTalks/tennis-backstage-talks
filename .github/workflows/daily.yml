name: Daily Tennis Predictions

run-name: Daily Tennis Predictions - ${{ github.event_name }} - ${{ github.run_number }}

on:
  schedule:
    # GitHub Actions cron beží v UTC.
    # 05:00 UTC = 07:00 Bratislava time počas CEST / UTC+2.
    - cron: "0 5 * * *"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Clean public folder
        run: |
          echo "===== CLEAN PUBLIC FOLDER ====="
          rm -rf public
          mkdir -p public

      - name: Run predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
          BET_WINDOW_START_HOUR: 6
          BET_WINDOW_END_NEXT_DAY_HOUR: 6
        run: python update.py

      - name: Apply TOP odds filter
        continue-on-error: true
        env:
          MIN_TOP_ODDS: 1.50
          MAX_TOP_ITEMS: 7
        run: python top_filter.py

      - name: Generate TOP7 results from current predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python results_checker.py

      - name: Generate ALL results from current ALL predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python results_checker_all.py

      - name: Generate source audit
        run: python audit_sources.py

      - name: Generate TOP page and TOP RSS
        run: python rss.py

      - name: Generate ALL page and ALL RSS
        run: python rss_all.py

      - name: Generate TOP7 results page and RSS
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python rss_results.py

      - name: Generate ALL results page and RSS
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python rss_results_all.py

      - name: Generate link hub
        run: bash publish_links.sh

      - name: Verify generated files
        run: |
          echo "===== PUBLIC FILES ====="
          ls -R public

          echo "===== CHECK CORE PAGES ====="

          for f in \
            index.html \
            tennis.xml \
            tennis_all.xml \
            results.xml \
            all_results.xml \
            all/index.html \
            results/index.html \
            all_results/index.html \
            H4V34N1C3D4Y177/index.html
          do
            if [ ! -f "public/$f" ]; then
              echo "ERROR: public/$f missing"
              exit 1
            fi
          done

          echo "===== CHECK TOP JSON ====="
          TOP_JSON=$(ls public/predictions_*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$TOP_JSON" ]; then
            echo "WARNING: TOP predictions JSON missing"
          else
            TOP_COUNT=$(python -c "import json; print(len(json.load(open('$TOP_JSON', encoding='utf-8'))))")
            echo "TOP_JSON=$TOP_JSON"
            echo "TOP_COUNT=$TOP_COUNT"

            if [ "$TOP_COUNT" -gt 7 ]; then
              echo "ERROR: TOP predictions has more than 7 items."
              exit 1
            fi
          fi

          echo "===== CHECK ALL JSON ====="
          ALL_JSON=$(ls public/all_predictions_*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$ALL_JSON" ]; then
            echo "WARNING: ALL predictions JSON missing"
          else
            ALL_COUNT=$(python -c "import json; print(len(json.load(open('$ALL_JSON', encoding='utf-8'))))")
            echo "ALL_JSON=$ALL_JSON"
            echo "ALL_COUNT=$ALL_COUNT"
          fi

          echo "===== LINK HUB PREVIEW ====="
          head -n 120 public/H4V34N1C3D4Y177/index.html

          echo "===== TOP PAGE PREVIEW ====="
          head -n 40 public/index.html

          echo "===== ALL PAGE PREVIEW ====="
          head -n 40 public/all/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
