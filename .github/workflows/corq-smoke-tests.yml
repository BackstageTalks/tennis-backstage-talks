name: Corq Smoke Tests

on:
  workflow_dispatch:
  push:
    paths:
      - "engine.py"
      - "match_normalizer.py"
      - "corq/**"
      - "thinq/**"
      - "web/**"
      - ".github/workflows/corq-smoke-tests.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi
      - name: Compile
        run: |
          python -m py_compile engine.py match_normalizer.py corq/*.py thinq/service.py thinq/loaders/*.py web/*.py
      - name: Runtime import smoke
        run: |
          python - <<'PY'
          from web.render import render_page
          html = render_page([{"pick":"A","opponent":"B","corq_probability":0.61,"corq_adjusted_score":0.6,"thinq":{"confidence":0.5,"edges":{"elo_edge":0.02},"h2h":{"status":"NO_DATA"}}}], "Smoke")
          assert "THINQ" in html and "ELO PICK" in html
          print("CORQ_SMOKE_OK")
          PY
