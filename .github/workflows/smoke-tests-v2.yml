# SMOKE_TESTS_VERSION = smoke_tests_v2_install_requests
name: Smoke tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - ".github/workflows/smoke-tests.yml"
      - "all_predictions_latest.json"
      - "top_predictions*.json"
      - "results*.json"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-tests:
    name: Python runtime smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install requests

      - name: Show working tree and hotfix markers
        shell: bash
        run: |
          set -euo pipefail
          echo "Commit SHA: $GITHUB_SHA"
          echo "Branch/ref: $GITHUB_REF"
          echo "Repo files:"
          ls -la
          echo ""
          if [ -f rss_results.py ]; then
            echo "rss_results.py header:"
            head -5 rss_results.py
            echo "rss_results.py CSS escape check:"
            grep -n "\.pick-sub" rss_results.py || true
            grep -n "\.sets-eval" rss_results.py || true
          fi
          echo ""
          if [ -f render_site.py ]; then
            echo "render_site.py key helper check:"
            grep -n "def pick_odds_value\|def opponent_odds_value\|def first_float_from_prediction" render_site.py || true
          fi

      - name: Python compile check
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import py_compile
          from pathlib import Path

          files = [
              "render_site.py",
              "rss_results.py",
              "build_pages.py",
              "fetch_matches.py",
              "prediction_engine_core.py",
              "prediction_engine_top.py",
              "prediction_engine_all.py",
              "corq_thinq_adapter.py",
              "thinq_service.py",
              "h2h_loader.py",
              "sackmann_loader.py",
          ]

          failed = []
          for name in files:
              path = Path(name)
              if not path.exists():
                  print(f"SKIP compile missing: {name}")
                  continue
              try:
                  py_compile.compile(str(path), doraise=True)
                  print(f"OK compile: {name}")
              except Exception as exc:
                  print(f"FAIL compile: {name}: {exc}")
                  failed.append(name)

          if failed:
              raise SystemExit(f"compile failed for: {failed}")
          PY

      - name: Runtime smoke test - render_site
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path("render_site.py")
          if not path.exists():
              print("SKIP render_site.py missing")
              raise SystemExit(0)

          spec = importlib.util.spec_from_file_location("render_site_smoke", path)
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)

          sample_prediction = {
              "pick": "Player A",
              "opponent": "Player B",
              "match": "Player A vs Player B",
              "probability": 61.2,
              "corq_q_probability": 0.612,
              "thinq_probability": 0.584,
              "odds": 1.72,
              "pick_odds": 1.72,
              "opponent_odds": 2.15,
              "surface": "Hard",
              "surface_raw": "Hard indoor",
              "best_of": 3,
              "expected_sets": "2-0",
              "sets_probability": 54.4,
              "most_likely_score": "2-0",
              "ai_match": 88.0,
              "model_gap": 2.8,
          }

          if not hasattr(mod, "render_page"):
              raise SystemExit("render_site.py missing render_page")

          try:
              html = mod.render_page([sample_prediction], "Smoke Test", "Runtime smoke")
          except TypeError:
              html = mod.render_page([sample_prediction])

          if not isinstance(html, str) or "Player A" not in html:
              raise SystemExit("render_site render_page returned invalid HTML")

          required_helpers = [
              "pick_odds_value",
              "opponent_odds_value",
          ]
          for helper in required_helpers:
              if not hasattr(mod, helper):
                  raise SystemExit(f"render_site.py missing helper: {helper}")

          print("OK runtime render_site.render_page")
          PY

      - name: Runtime smoke test - rss_results
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path("rss_results.py")
          if not path.exists():
              print("SKIP rss_results.py missing")
              raise SystemExit(0)

          text = path.read_text(encoding="utf-8")
          if ".pick-sub {\n" in text or ".sets-eval {\n" in text:
              raise SystemExit("rss_results.py contains unescaped CSS braces in f-string blocks")
          if ".pick-sub {{" not in text:
              raise SystemExit("rss_results.py missing escaped .pick-sub {{ block")
          if ".sets-eval {{" not in text:
              raise SystemExit("rss_results.py missing escaped .sets-eval {{ block")

          spec = importlib.util.spec_from_file_location("rss_results_smoke", path)
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)

          if not hasattr(mod, "render_page"):
              raise SystemExit("rss_results.py missing render_page")

          if hasattr(mod, "empty_dataset"):
              data = {
                  "top5": mod.empty_dataset("top5"),
                  "all": mod.empty_dataset("all"),
              }
          else:
              data = {
                  "top5": {"items": []},
                  "all": {"items": []},
              }

          html = mod.render_page(data)
          if not isinstance(html, str) or "html" not in html.lower():
              raise SystemExit("rss_results render_page returned invalid HTML")

          print("OK runtime rss_results.render_page")
          PY

      - name: Data contract smoke test - predictions JSON
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          candidates = [
              Path("all_predictions_latest.json"),
              Path("docs/all_predictions_latest.json"),
              Path("public/all_predictions_latest.json"),
          ]
          path = next((p for p in candidates if p.exists()), None)
          if path is None:
              print("SKIP prediction JSON missing")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))
          if isinstance(data, dict):
              if "predictions" in data and isinstance(data["predictions"], list):
                  rows = data["predictions"]
              elif "items" in data and isinstance(data["items"], list):
                  rows = data["items"]
              else:
                  rows = [v for v in data.values() if isinstance(v, dict)]
          elif isinstance(data, list):
              rows = data
          else:
              raise SystemExit("prediction JSON has unsupported root type")

          print(f"Loaded {len(rows)} prediction rows from {path}")

          hard_errors = []
          warnings = []
          required_any = ["pick", "opponent", "match"]

          for i, row in enumerate(rows[:250], start=1):
              if not isinstance(row, dict):
                  hard_errors.append(f"row {i}: not object")
                  continue
              for key in required_any:
                  if not row.get(key):
                      warnings.append(f"row {i}: missing {key}")
              if row.get("pick") and row.get("opponent") and row.get("pick") == row.get("opponent"):
                  hard_errors.append(f"row {i}: pick equals opponent")

              corq = row.get("corq_q_probability", row.get("probability"))
              thinq = row.get("thinq_probability", row.get("thinq_q_probability"))
              odds = row.get("odds", row.get("pick_odds"))

              if corq in [None, ""]:
                  warnings.append(f"row {i}: missing Corq/probability")
              if thinq in [None, ""]:
                  warnings.append(f"row {i}: missing Thinq probability")
              if odds in [None, ""]:
                  warnings.append(f"row {i}: missing odds")

          for msg in warnings[:40]:
              print("WARN", msg)
          if len(warnings) > 40:
              print(f"WARN ... {len(warnings) - 40} more warnings")

          if hard_errors:
              for msg in hard_errors[:40]:
                  print("ERROR", msg)
              raise SystemExit(f"prediction JSON hard errors: {len(hard_errors)}")

          print("OK prediction JSON contract smoke")
          PY

      - name: H2H safe import smoke test
        shell: bash
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib.util
          import os
          from pathlib import Path

          path = Path("h2h_loader.py")
          if not path.exists():
              print("SKIP h2h_loader.py missing")
              raise SystemExit(0)

          print("RAPIDAPI_KEY present:", bool(os.environ.get("RAPIDAPI_KEY")))

          spec = importlib.util.spec_from_file_location("h2h_loader_smoke", path)
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)

          public_names = [name for name in dir(mod) if not name.startswith("_")]
          print("h2h_loader public symbols:", ", ".join(public_names[:30]))

          # This test intentionally does not call external API.
          # Goal: H2H module must import safely and not fail the daily build when API is unavailable.
          print("OK h2h_loader safe import smoke")
          PY

      - name: Build scripts dry-run import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          for name in ["build_pages.py", "prediction_engine_core.py", "prediction_engine_top.py", "prediction_engine_all.py", "thinq_service.py"]:
              path = Path(name)
              if not path.exists():
                  print(f"SKIP import missing: {name}")
                  continue
              try:
                  spec = importlib.util.spec_from_file_location(name.replace(".py", "_smoke"), path)
                  mod = importlib.util.module_from_spec(spec)
                  spec.loader.exec_module(mod)
                  print(f"OK import: {name}")
              except SystemExit as exc:
                  print(f"WARN import caused SystemExit in {name}: {exc}")
              except Exception as exc:
                  raise SystemExit(f"FAIL import {name}: {exc}")
          PY
