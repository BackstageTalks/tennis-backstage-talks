name: Telegram RSS Feed

on:
  workflow_dispatch:
    inputs:
      feed:
        description: 'Feed to send: all, corq, thinq, cloq'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - corq
          - thinq
          - cloq
      limit:
        description: 'How many picks per feed'
        required: false
        default: '7'

permissions:
  contents: read

concurrency:
  group: telegram-rss-feed
  cancel-in-progress: false

jobs:
  send-telegram-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install feed dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Syntax check Telegram feed script
        run: |
          python -m py_compile telegram_rss_feed.py

      - name: Send Telegram RSS feed
        env:
          TG_BOT_BTLKR: ${{ secrets.TG_BOT_BTLKR }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_FEED: ${{ github.event.inputs.feed || 'all' }}
          TG_FEED_LIMIT: ${{ github.event.inputs.limit || '7' }}
        run: |
          python telegram_rss_feed.py
