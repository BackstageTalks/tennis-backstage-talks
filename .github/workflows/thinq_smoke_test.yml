name: THINQ Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - "thinq/**"
      - ".github/workflows/thinq_smoke_test.yml"
  pull_request:
    paths:
      - "thinq/**"
      - ".github/workflows/thinq_smoke_test.yml"

jobs:
  thinq-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install THINQ runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Compile THINQ core files
        run: |
          python -m py_compile thinq/loaders/elo_loader.py
          python -m py_compile thinq/loaders/h2h_loader.py
          python -m py_compile thinq/loaders/player_resolver.py
          python -m py_compile thinq/loaders/sackmann_loader.py
          python -m py_compile thinq/loaders/thinq_loader.py
          python -m py_compile thinq/features/data_quality.py
          python -m py_compile thinq/features/level_context.py
          python -m py_compile thinq/features/match_dynamics.py
          python -m py_compile thinq/features/schedule_fatigue.py
          python -m py_compile thinq/features/status_risk.py
          python -m py_compile thinq/features/surface_transition.py
          python -m py_compile thinq/thinq_service.py
          python -m py_compile thinq/build_thinq_snapshot.py
          python -m py_compile thinq/scripts/smoke_test_thinq.py

      - name: Check ELO cache metadata if present
        run: |
          if [ -f thinq/data/elo/elo_cache.json ]; then
            python - <<'PY'
            import json
            from pathlib import Path
            path = Path('thinq/data/elo/elo_cache.json')
            data = json.loads(path.read_text(encoding='utf-8'))
            print('generated_at:', data.get('generated_at'))
            print('players:', len(data.get('players', {})))
            print('sources:', list((data.get('sources') or {}).keys()))
            assert len(data.get('players', {})) > 100, 'ELO cache player count is unexpectedly low'
            PY
          else
            echo "ELO cache not present in this branch. Offline structural smoke test will still run."
          fi

      - name: Run offline THINQ smoke test
        run: |
          python thinq/scripts/smoke_test_thinq.py

      - name: Validate offline smoke snapshot
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('thinq/outputs/thinq_smoke_snapshot.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          print('snapshot count:', data.get('count'))
          assert data.get('count') == 2, 'Smoke snapshot did not build both test matches'
          for match in data.get('matches', []):
              assert 'edges' in match, 'Missing edges block'
              assert 'contexts' in match, 'Missing contexts block'
              assert 'match_dynamics' in match['contexts'], 'Missing match_dynamics context'
          PY

      - name: Upload smoke snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: thinq-smoke-snapshot
          path: thinq/outputs/thinq_smoke_snapshot.json
