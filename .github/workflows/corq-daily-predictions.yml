name: Corq Daily Predictions

on:
  workflow_dispatch:
    inputs:
      publish_pages:
        description: "Publish generated public/ through GitHub Pages artifact"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"

concurrency:
  group: corq-daily-predictions
  cancel-in-progress: false

jobs:
  build:
    name: Build CORQ daily predictions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install requests
          fi

      - name: Compile clean CORQ runtime
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            engine.py \
            match_normalizer.py \
            corq/*.py \
            thinq/service.py \
            thinq/loaders/*.py \
            web/*.py

      - name: Runtime import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import engine
          from corq.model import CorqModel
          from corq.ranking import rank_predictions
          from thinq.service import ThinqService
          from web.render import render_page
          html = render_page([{
              "pick": "Player A",
              "opponent": "Player B",
              "corq_probability": 0.61,
              "corq_adjusted_score": 0.60,
              "thinq": {
                  "confidence": 0.50,
                  "edges": {"elo_edge": 0.02},
                  "h2h": {"status": "NO_DATA", "edge": 0.0},
              },
          }], "Smoke")
          assert "THINQ" in html
          assert "ELO PICK" in html
          print("CORQ_CLEAN_RUNTIME_IMPORT_SMOKE_OK")
          PY

      - name: Run CORQ clean daily engine
        shell: bash
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          X_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          set -euo pipefail
          python engine.py

      - name: Validate required outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking required public files..."
          test -f public/all_predictions_latest.json
          test -f public/corq_predictions_latest.json
          test -f public/top7_predictions_latest.json
          test -f public/index.html
          test -f public/all/index.html

          echo "Output counts:"
          python - <<'PY'
          import json
          from pathlib import Path

          def load_json(path):
              data = json.loads(Path(path).read_text(encoding="utf-8"))
              if isinstance(data, dict):
                  return data.get("predictions") or data.get("picks") or data.get("data") or []
              if isinstance(data, list):
                  return data
              return []

          for path in [
              "public/all_predictions_latest.json",
              "public/corq_predictions_latest.json",
              "public/top7_predictions_latest.json",
          ]:
              rows = load_json(path)
              print(f"{path}: {len(rows)} rows")
          PY

          echo "Checking THINQ markers where available..."
          grep -R "THINQ" -n public/index.html public/all/index.html | head -20 || echo "WARN: THINQ marker not found, probably no rows rendered on one page."
          grep -R "ELO PICK" -n public/index.html public/all/index.html | head -20 || echo "WARN: ELO PICK marker not found, probably no rows rendered on one page."

          echo "Top7 preview:"
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("public/top7_predictions_latest.json").read_text(encoding="utf-8"))
          rows = data.get("predictions") if isinstance(data, dict) else data
          rows = rows or []
          for i, r in enumerate(rows[:7], 1):
              print(i, r.get("pick"), "vs", r.get("opponent"), "@", r.get("pick_odds"), "score", r.get("corq_adjusted_score"))
          if not rows:
              print("WARN: TOP7 is empty. This is allowed by workflow, but model filters should be reviewed.")
          PY

      - name: Add force publish marker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          date -u +"%Y-%m-%d %H:%M:%S UTC" > public/.force_publish
          touch public/.nojekyll
          cat public/.force_publish

      - name: Upload generated public files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: corq-public-output
          path: public
          retention-days: 14

      - name: Commit generated outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public data || true
          if git diff --cached --quiet; then
            echo "No generated public/data changes to commit."
          else
            git commit -m "Update CORQ daily predictions"
            git push
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.publish_pages != 'false' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ github.event_name == 'schedule' || inputs.publish_pages != 'false' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
