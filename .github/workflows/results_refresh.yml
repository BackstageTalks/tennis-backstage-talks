name: Refresh Tennis Results

run-name: Refresh Tennis Results - ${{ github.event_name }} - ${{ github.run_number }}

on:
  schedule:
    # Refresh results every 2 hours.
    - cron: "0 */2 * * *"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-results:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Prepare folders
        run: |
          echo "===== PREPARE FOLDERS ====="
          mkdir -p public
          mkdir -p public/results
          mkdir -p data/results
          mkdir -p data/pick_history/all
          mkdir -p data/pick_history/top5

      - name: Generate TOP5 and ALL results
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python results_checker.py

      - name: Generate results page and RSS
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python rss_results.py

      - name: Update long-term history database
        run: python history_tracker.py

      - name: Generate model stats page
        run: python stats_page.py

      - name: Generate link hub
        run: bash publish_links.sh

      - name: Commit updated results and history data
        run: |
          echo "===== COMMIT UPDATED RESULTS AND HISTORY DATA ====="

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ || true
          git add public/results_data.json || true
          git add public/results_debug.json || true

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh tennis results data [skip ci]"
            git push
          fi

      - name: Verify generated files
        run: |
          echo "===== PUBLIC FILES ====="
          ls -R public

          echo "===== DATA FILES ====="
          ls -R data || true

          echo "===== CHECK RESULTS DATA ====="

          if [ ! -f "data/results/all_results.json" ]; then
            echo "ERROR: data/results/all_results.json missing"
            exit 1
          fi

          if [ ! -f "data/results/top5_results.json" ]; then
            echo "ERROR: data/results/top5_results.json missing"
            exit 1
          fi

          if [ ! -f "public/results_data.json" ]; then
            echo "ERROR: public/results_data.json missing"
            exit 1
          fi

          if [ ! -f "public/results/index.html" ]; then
            echo "ERROR: public/results/index.html missing"
            exit 1
          fi

          if [ ! -f "public/results.xml" ]; then
            echo "ERROR: public/results.xml missing"
            exit 1
          fi

          echo "===== CHECK HISTORY DB ====="

          if [ ! -f "data/bet_history.jsonl" ]; then
            echo "ERROR: data/bet_history.jsonl missing"
            exit 1
          fi

          if [ ! -f "data/bet_history_learning_snapshot.json" ]; then
            echo "ERROR: data/bet_history_learning_snapshot.json missing"
            exit 1
          fi

          echo "===== CHECK STATS PAGE ====="

          if [ ! -f "public/stats/index.html" ]; then
            echo "ERROR: public/stats/index.html missing"
            exit 1
          fi

          if [ ! -f "public/stats.json" ]; then
            echo "ERROR: public/stats.json missing"
            exit 1
          fi

          echo "===== CHECK HUB 177 ====="

          if [ ! -f "public/H4V34N1C3D4Y177/index.html" ]; then
            echo "ERROR: public/H4V34N1C3D4Y177/index.html missing"
            exit 1
          fi

          echo "===== RESULTS DATA PREVIEW ====="
          head -n 120 public/results_data.json || true

          echo "===== RESULTS PAGE PREVIEW ====="
          head -n 120 public/results/index.html || true

          echo "===== HISTORY DB PREVIEW ====="
          head -n 20 data/bet_history.jsonl || true

          echo "===== STATS PAGE PREVIEW ====="
          head -n 100 public/stats/index.html || true

          echo "===== HUB 177 PREVIEW ====="
          head -n 120 public/H4V34N1C3D4Y177/index.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
