name: Schedule Canary

on:
  push:
    branches:
      - main

  schedule:
    - cron: '*/5 * * * *'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: schedule-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - name: Print canary info
        run: |
          echo "Schedule canary triggered."
          echo "Event name: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "UTC now: $(date -u)"
          echo "Local runner now: $(date)"
