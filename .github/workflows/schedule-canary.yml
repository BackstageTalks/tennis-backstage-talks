name: Schedule Canary

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - name: Print schedule check
        run: |
          echo "Schedule canary triggered."
          echo "Event name: ${{ github.event_name }}"
          echo "UTC now: $(date -u)"
