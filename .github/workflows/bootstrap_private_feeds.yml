name: Bootstrap Private RSS Feeds

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bootstrap-feeds:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create placeholder private feeds
        run: |
          echo "===== CREATE PLACEHOLDER PRIVATE FEEDS ====="

          rm -rf public
          mkdir -p public

          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <title>BackstageTalks</title>
          <meta name="robots" content="noindex,nofollow,noarchive">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
          body {
              font-family: Arial, sans-serif;
              background: #160f0f;
              color: #f4f4f4;
              margin: 0;
              padding: 40px;
          }
          .container {
              max-width: 720px;
              margin: 0 auto;
          }
          h1 {
              font-size: 34px;
          }
          p {
              color: #cfcfcf;
              font-size: 18px;
          }
          </style>
          </head>
          <body>
          <div class="container">
          <h1>BackstageTalks</h1>
          <p>No public content available.</p>
          </div>
          </body>
          </html>
          EOF

          cat > public/robots.txt <<'EOF'
          User-agent: *
          Disallow: /tennis.xml
          Disallow: /tennis_all.xml
          Disallow: /results.xml
          Disallow: /all_results.xml
          Disallow: /all/
          Disallow: /results/
          Disallow: /all_results/
          Disallow: /source_manifest.json
          Disallow: /source_audit.json
          EOF

          create_page () {
            FILE="$1"
            TITLE="$2"

            cat > "public/$FILE" <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <title>$TITLE</title>
          <meta name="robots" content="noindex,nofollow,noarchive">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
          body {
              font-family: Arial, sans-serif;
              background: #160f0f;
              color: #f4f4f4;
              margin: 0;
              padding: 40px;
          }
          .container {
              max-width: 720px;
              margin: 0 auto;
          }
          h1 {
              font-size: 34px;
          }
          p {
              color: #cfcfcf;
              font-size: 18px;
          }
          </style>
          </head>
          <body>
          <div class="container">
          <h1>$TITLE</h1>
          <p>Content will be generated by the next daily run.</p>
          </div>
          </body>
          </html>
          EOF
          }

          create_feed () {
            FILE="$1"
            TITLE="$2"
            LINK="$3"

            cat > "public/$FILE" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0">
          <channel>
          <title>$TITLE</title>
          <link>$LINK</link>
          <description>$TITLE initialized. Waiting for first daily run.</description>
          <item>
          <title>Feed initialized</title>
          <link>$LINK</link>
          <guid isPermaLink="false">$FILE-bootstrap</guid>
          <pubDate>Mon, 29 Jun 2026 03:30:00 GMT</pubDate>
          <description>This RSS feed is initialized. Real tennis picks will be published by the next daily run.</description>
          </item>
          </channel>
          </rss>
          EOF
          }

          BASE="https://backstagetalks.github.io/tennis-backstage-talks"

          echo "===== SOURCE PLACEHOLDERS ====="

          cat > public/H4V34N1C3D4Y170 <<'EOF'
          {
            "status": "PLACEHOLDER",
            "name": "source_manifest",
            "message": "Source manifest will be generated by the next daily run."
          }
          EOF

          cat > public/H4V34N1C3D4Y171 <<'EOF'
          {
            "status": "PLACEHOLDER",
            "name": "source_audit",
            "message": "Source audit will be generated by the next daily run."
          }
          EOF

          echo "===== WEB PLACEHOLDERS ====="

          create_page "H4V34N1C3D4Y180" "BackstageTalks Tennis TOP 7"
          create_page "H4V34N1C3D4Y182" "BackstageTalks Tennis TOP 7 Results"
          create_page "H4V34N1C3D4Y184" "BackstageTalks Tennis ALL"
          create_page "H4V34N1C3D4Y186" "BackstageTalks Tennis ALL Results"

          echo "===== RSS PLACEHOLDERS WITH .xml ====="

          create_feed "H4V34N1C3D4Y181.xml" "BackstageTalks Tennis TOP 7 RSS" "$BASE/H4V34N1C3D4Y180"
          create_feed "H4V34N1C3D4Y183.xml" "BackstageTalks Tennis TOP 7 Results RSS" "$BASE/H4V34N1C3D4Y182"
          create_feed "H4V34N1C3D4Y185.xml" "BackstageTalks Tennis ALL RSS" "$BASE/H4V34N1C3D4Y184"
          create_feed "H4V34N1C3D4Y187.xml" "BackstageTalks Tennis ALL Results RSS" "$BASE/H4V34N1C3D4Y186"

          echo "===== RSS PLACEHOLDERS WITHOUT EXTENSION ====="

          cp public/H4V34N1C3D4Y181.xml public/H4V34N1C3D4Y181
          cp public/H4V34N1C3D4Y183.xml public/H4V34N1C3D4Y183
          cp public/H4V34N1C3D4Y185.xml public/H4V34N1C3D4Y185
          cp public/H4V34N1C3D4Y187.xml public/H4V34N1C3D4Y187

          echo "===== PUBLIC FILES ====="
          ls -R public

      - name: Verify placeholder feeds
        run: |
          echo "===== VERIFY PLACEHOLDER FEEDS ====="

          for f in \
            H4V34N1C3D4Y181.xml \
            H4V34N1C3D4Y183.xml \
            H4V34N1C3D4Y185.xml \
            H4V34N1C3D4Y187.xml
          do
            if [ ! -f "public/$f" ]; then
              echo "ERROR: public/$f missing"
              exit 1
            fi

            if ! grep -q "<rss version=\"2.0\">" "public/$f"; then
              echo "ERROR: public/$f is not RSS"
              exit 1
            fi

            if ! grep -q "<item>" "public/$f"; then
              echo "ERROR: public/$f has no item"
              exit 1
            fi
          done

          echo "===== VERIFY WEB PLACEHOLDERS ====="

          for f in \
            H4V34N1C3D4Y180 \
            H4V34N1C3D4Y182 \
            H4V34N1C3D4Y184 \
            H4V34N1C3D4Y186
          do
            if [ ! -f "public/$f" ]; then
              echo "ERROR: public/$f missing"
              exit 1
            fi
          done

          echo "===== TOP RSS PREVIEW ====="
          head -n 40 public/H4V34N1C3D4Y181.xml

          echo "===== ALL RSS PREVIEW ====="
          head -n 40 public/H4V34N1C3D4Y185.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy placeholder feeds to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
