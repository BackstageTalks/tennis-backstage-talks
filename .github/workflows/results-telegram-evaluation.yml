name: Results and Telegram Evaluation

on:
  workflow_dispatch:
    inputs:
      send_pending:
        description: "Send interim Telegram update with non-delayed pending picks shown as hourglass. 0/1"
        required: false
        default: "0"
      eval_model:
        description: "Model key to evaluate: thinq, corq, cloq, all"
        required: false
        default: "all"
  schedule:
    # Every 3 hours during the main tennis/results window.
    # GitHub cron is UTC. During CEST: 07,10,13,16,19 UTC = 09,12,15,18,21 SK/CZ.
    # This workflow does NOT generate new predictions and does NOT send original TG bets.
    - cron: "0 7-19/3 * * *"
    # Final daily evaluation at 23:59 SK/CZ during summer time (CEST = UTC+2).
    # 21:59 UTC = 23:59 CEST. If only delayed/postponed matches remain, they are sent with 🕒.
    - cron: "59 21 * * *"

permissions:
  contents: write

concurrency:
  group: results-telegram-evaluation
  cancel-in-progress: false

jobs:
  evaluate-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests

      - name: Syntax check results/evaluation files
        run: |
          python -m py_compile results_fetcher.py
          python -m py_compile results_checker.py
          python -m py_compile rss_results.py
          python -m py_compile telegram_bets_evaluator.py

      - name: Prepare directories
        run: |
          mkdir -p public
          mkdir -p public/results
          mkdir -p data/results
          mkdir -p data/results/telegram_bets_eval_sent
          mkdir -p data/telegram_snapshots
          mkdir -p data/telegram_snapshots/evaluated

      - name: Run results checker
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3,6,871"
          TENNISAPI_PROVIDER_ID: "1"
          RESULTS_LOOKBACK_DAYS: "90"
        run: |
          python results_checker.py

      - name: Build results page/data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3,6,871"
          TENNISAPI_PROVIDER_ID: "1"
          RESULTS_LOOKBACK_DAYS: "90"
        run: |
          python rss_results.py

      - name: Evaluate Telegram bets
        env:
          TG_BOT_BTLKR: ${{ secrets.TG_BOT_BTLKR }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_EVAL_MODEL: ${{ github.event.inputs.eval_model || 'all' }}
          TG_EVAL_SEND_PENDING: ${{ github.event.inputs.send_pending || '0' }}
          TG_EVAL_ALLOW_RESEND: "0"
          RESULTS_DATA_PATH: public/results_data.json
        run: |
          python telegram_bets_evaluator.py

      - name: Commit results and evaluated snapshots
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A public/results public/results_data.json data/results data/telegram_snapshots || true

          if git diff --cached --quiet; then
            echo "No results/evaluation changes to commit."
            exit 0
          fi

          git commit -m "Update tennis results and Telegram evaluation"
          git pull --rebase --autostash
          git push
