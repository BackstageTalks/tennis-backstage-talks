name: Model Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 pandas openpyxl
          fi

      - name: Run model diagnostics
        run: |
          python model_diagnostics.py

      - name: Show diagnostics JSON
        run: |
          echo "=== MODEL DIAGNOSTICS JSON ==="

          if [ -f public/model_diagnostics.json ]; then
            cat public/model_diagnostics.json
          else
            echo "public/model_diagnostics.json was not created"
            exit 1
          fi
