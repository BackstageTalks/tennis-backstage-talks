name: BsT AI TA Sync

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * 2"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run BsT AI TA sync
        run: python -m src.bst_ai.ta_sync

      - name: Commit updated BsT AI data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/bst_ai
          git add data/bst_ai
          git add src/bst_ai

          git diff --staged --quiet || git commit -m "Update BsT AI data"

          git push
