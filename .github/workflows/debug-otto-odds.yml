name: Debug Otto Odds

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug Otto odds endpoints
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python - <<'PY'
          from tennisapi_client import TennisApiClient, normalize_winning_odds
          from tennisapi_cache import normalize_event_market_odds_payload

          event_id = 16486813
          client = TennisApiClient()

          print("DEBUG EVENT:", event_id)
          print("MATCH: Otto Virtanen vs Dylan Dietrich")

          tests = [
              ("getMatchWinningOdds", lambda: client.get_match_winning_odds(event_id)),
              ("getMatchBettingOdds", lambda: client.get_match_betting_odds(event_id)),
              ("getAllOddsForEvent", lambda: client.get_all_odds_for_event(event_id)),
              ("getMatchFeaturedOdds", lambda: client.get_match_featured_odds(event_id)),
          ]

          for name, func in tests:
              print("")
              print("----", name)
              try:
                  payload = func()
                  print("payload type:", type(payload).__name__)
                  print("payload preview:", str(payload)[:1500])

                  if name == "getMatchWinningOdds":
                      print("normalized:", normalize_winning_odds(payload))
                  else:
                      print("normalized:", normalize_event_market_odds_payload(payload))

              except Exception as exc:
                  print("ERROR:", repr(exc))
          PY
