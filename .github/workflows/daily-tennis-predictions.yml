name: Daily Tennis Predictions

on:
  workflow_dispatch:

  schedule:
    # Daily run. UTC time.
    # 04:15 UTC = 06:15 CEST during summer.
    # Goal: after our 06:00 CEST daily window.
    - cron: "15 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Elo Ratings and Form Store
        run: python build_elo.py

      - name: Run predictions
        run: python update.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
          ODDS_API_NET_KEY: ${{ secrets.ODDS_API_NET_KEY }}
          ODDS_API_NET_BASE_URL: ${{ secrets.ODDS_API_NET_BASE_URL }}
          ODDS_API_REGIONS: eu,uk
          ODDS_API_MARKETS: h2h

      - name: Generate TOP page and RSS
        run: python rss.py

      - name: Generate ALL page and RSS
        run: python rss_all.py

      - name: Backtest Wimbledon 2026-06-30
        run: python backtest_wimbledon_2026_06_30.py

      - name: Selection Lab Wimbledon
        run: python selection_lab_wimbledon.py

      - name: Last 7 Days Retro Lab
        run: python lab_last7.py

      - name: Verify outputs
        run: |
          test -f public/index.html
          test -f public/tennis.xml

          test -f public/all/index.html
          test -f public/tennis_all.xml

          test -f public/debug_counts.json

          test -f public/odds_debug.json
          test -f public/odds_snapshot.json

          test -f public/ts_debug.json
          test -f public/ts_odds_snapshot.json

          test -f public/play_candidates_history.jsonl

          test -f public/backtest_2026-06-30/index.html
          test -f public/backtest_2026-06-30/index.json

          test -f public/selection_lab_wimbledon/index.html
          test -f public/selection_lab_wimbledon/index.json

          test -f public/lab_last7/index.html
          test -f public/lab_last7/index.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
