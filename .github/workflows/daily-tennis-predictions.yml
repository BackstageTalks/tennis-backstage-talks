name: Daily Tennis Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "05 04 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-tennis-predictions
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check TennisApi files
        run: |
          python -m py_compile tennisapi_client.py
          python -m py_compile results_fetcher.py
          python -m py_compile results_checker.py
          python -m py_compile odds_api.py
          if [ -f fix_navigation.py ]; then python -m py_compile fix_navigation.py; fi

      - name: Prepare directories
        run: |
          mkdir -p public
          mkdir -p public/results
          mkdir -p data
          mkdir -p data/pick_history
          mkdir -p data/pick_history/all
          mkdir -p data/pick_history/top5
          mkdir -p data/results
          mkdir -p data/marq_ai

      - name: Check API secrets
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3"
          TENNISAPI_PROVIDER_ID: "1"
        run: |
          python -c "import os; print('ODDS_API_KEY:', 'OK' if os.getenv('ODDS_API_KEY') else 'MISSING')"
          python -c "import os; print('RAPIDAPI_KEY:', 'OK' if os.getenv('RAPIDAPI_KEY') else 'MISSING')"
          python -c "import os; print('TENNISAPI_RAPIDAPI_KEY:', 'OK' if os.getenv('TENNISAPI_RAPIDAPI_KEY') else 'MISSING')"
          python -c "import os; print('SGOAPI:', 'OK' if os.getenv('SGOAPI') else 'MISSING')"
          python -c "import os; print('TENNISAPI_CATEGORY_IDS:', os.getenv('TENNISAPI_CATEGORY_IDS', 'MISSING'))"
          python -c "import os; print('TENNISAPI_PROVIDER_ID:', os.getenv('TENNISAPI_PROVIDER_ID', 'MISSING'))"

      - name: Run predictions
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3"
          TENNISAPI_PROVIDER_ID: "1"
        run: |
          python update.py

      - name: Build TOP and ALL pages
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3"
          TENNISAPI_PROVIDER_ID: "1"
        run: |
          python build_pages.py

      - name: Run results checker
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3"
          TENNISAPI_PROVIDER_ID: "1"
        run: |
          python results_checker.py

      - name: Build results page
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3"
          TENNISAPI_PROVIDER_ID: "1"
        run: |
          python rss_results.py

      - name: Fix navigation links
        run: |
          python fix_navigation.py

      - name: Ensure results page exists
        run: |
          if [ ! -f public/results/index.html ]; then
            printf '%s\n' '<!doctype html>' '<html>' '<head>' '<meta charset="utf-8">' '<title>Results</title>' '</head>' '<body>' '<h1>Results</h1>' '<p>No results available yet.</p>' '</body>' '</html>' > public/results/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
