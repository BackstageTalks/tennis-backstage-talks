name: Daily Tennis Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "05 04 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-tennis-predictions
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check prediction window
        id: prediction_window
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone, timedelta

          # SK/CZ time = UTC+2 in summer period.
          now_utc = datetime.now(timezone.utc)
          now_sk = now_utc + timedelta(hours=2)

          # Manual workflow_dispatch should always run.
          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          if event_name == "workflow_dispatch":
              should_run = "true"
          else:
              # Daily scheduled run after 06:00 SK/CZ.
              should_run = "true" if now_sk.hour >= 6 else "false"

          print(f"UTC now: {now_utc.isoformat()}")
          print(f"SK/CZ approx now: {now_sk.isoformat()}")
          print(f"should_run={should_run}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_run={should_run}\n")
          PY

      - name: Prepare directories
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          mkdir -p public
          mkdir -p data
          mkdir -p data/pick_history
          mkdir -p data/pick_history/all
          mkdir -p data/pick_history/top5
          mkdir -p data/results
          mkdir -p data/marq_ai

      - name: Check API secrets
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          import os

          print("ODDS_API_KEY:", "OK" if os.getenv("ODDS_API_KEY") else "MISSING")
          print("RAPIDAPI_KEY:", "OK" if os.getenv("RAPIDAPI_KEY") else "MISSING")
          print("SGOAPI:", "OK" if os.getenv("SGOAPI") else "MISSING")
          PY
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}

      - name: Run predictions
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python update.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}

      - name: Build TOP and ALL pages
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python build_pages.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}

      - name: Run results checker
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python results_checker.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}

      - name: Build results page
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python rss_results.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}

      - name: Ensure results page exists
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          mkdir -p public/results
          if [ ! -f public/results/index.html ]; then
            cat > public/results/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Results</title>
          </head>
          <body>
            <h1>Results</h1>
            <p>No results available yet.</p>
          </body>
          </html>
          HTML
          fi

      - name: Setup Pages
        if: steps.prediction_window.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.prediction_window.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        if: steps.prediction_window.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
