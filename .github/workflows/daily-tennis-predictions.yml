name: Daily Tennis Predictions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Update ELO Database
        run: |
          python -m src.elo.update_elo

      - name: Run predictions
        run: |
          python update.py

      - name: Commit ELO files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/elo

          if git diff --staged --quiet; then
            echo "No ELO changes"
          else
            git commit -m "Update ELO database"
            git push
          fi

      - name: Prepare files
        run: |
          mkdir -p public
          cp -r *.html public/ || true
          cp -r *.json public/ || true
          cp -r *.xml public/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
