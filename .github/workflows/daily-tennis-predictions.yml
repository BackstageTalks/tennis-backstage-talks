name: Daily Tennis Predictions

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run even outside SK/CZ daily prediction window"
        required: false
        default: false
        type: boolean

  schedule:
    # Summer time SK/CZ: 04:30 UTC = 06:30 local
    # Winter time SK/CZ: 05:30 UTC = 06:30 local
    # Guard step below allows only the run where local hour is 06.
    - cron: "30 4 * * *"
    - cron: "30 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write


concurrency:
  group: tennis-backstage-talks-main-write
  cancel-in-progress: false


jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      LOCAL_TZ_OFFSET_HOURS: "2"
      BET_WINDOW_START_HOUR: "6"
      BET_WINDOW_END_NEXT_DAY_HOUR: "6"
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check SK/CZ prediction window
        id: prediction_window
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run == true }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          LOCAL_TIME=$(TZ=Europe/Bratislava date -Iseconds)
          LOCAL_HOUR=$(TZ=Europe/Bratislava date +%H)
          LOCAL_HOUR_NUM=$((10#$LOCAL_HOUR))

          echo "SK/CZ local time: $LOCAL_TIME"
          echo "SK/CZ local hour: $LOCAL_HOUR"
          echo "GitHub event: $EVENT_NAME"
          echo "Force run: $FORCE_RUN"

          if [ "$FORCE_RUN" = "true" ]; then
            echo "Manual force_run=true. Workflow will continue."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=force_run" >> "$GITHUB_OUTPUT"
            echo "local_time=$LOCAL_TIME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$LOCAL_HOUR_NUM" -ge 6 ]; then
            echo "Manual run after 06:00 SK/CZ. Workflow will continue."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual_after_06_local" >> "$GITHUB_OUTPUT"
            echo "local_time=$LOCAL_TIME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "schedule" ] && [ "$LOCAL_HOUR_NUM" -eq 6 ]; then
            echo "Scheduled run during SK/CZ 06:00 hour. Workflow will continue."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=scheduled_06_local" >> "$GITHUB_OUTPUT"
            echo "local_time=$LOCAL_TIME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Not the daily prediction window. Workflow will stop successfully."
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "reason=outside_prediction_window" >> "$GITHUB_OUTPUT"
          echo "local_time=$LOCAL_TIME" >> "$GITHUB_OUTPUT"

      - name: Stop outside prediction window
        if: steps.prediction_window.outputs.should_run != 'true'
        run: |
          echo "Daily prediction snapshot was not generated."
          echo "Reason: ${{ steps.prediction_window.outputs.reason }}"
          echo "SK/CZ local time: ${{ steps.prediction_window.outputs.local_time }}"
          echo "This is intentional. TOP5 / ALL are generated only once daily after 06:00 SK/CZ."

      - name: Setup Python
        if: steps.prediction_window.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 pandas openpyxl
          fi

      - name: Prepare folders
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          mkdir -p public
          mkdir -p public/all
          mkdir -p public/results
          mkdir -p data
          mkdir -p data/play_history
          mkdir -p data/pick_history/all
          mkdir -p data/pick_history/top5
          mkdir -p data/results

      - name: Run predictions
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python update.py

      - name: Build TOP and ALL pages
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python build_pages.py

      - name: Run results checker
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          if [ -f results_checker.py ]; then
            echo "Running results_checker.py"
            python results_checker.py
          else
            echo "results_checker.py not found."
            echo "Creating fallback public/results_data.json"
            python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          os.makedirs("public", exist_ok=True)

          empty_summary = {
              "picks": 0,
              "won": 0,
              "lost": 0,
              "void": 0,
              "pending": 0,
              "unknown": 0,
              "units": 0.0,
              "win_rate": None
          }

          payload = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "today": empty_summary,
              "last_7_days": empty_summary,
              "current_month": empty_summary,
              "all_time": empty_summary,
              "items": [],
              "note": "results_checker.py not found. Results page generated with fallback data."
          }

          with open("public/results_data.json", "w", encoding="utf-8") as file:
              json.dump(payload, file, indent=2, ensure_ascii=False)
          PY
          fi

      - name: Ensure results data exists
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          mkdir -p public
          mkdir -p public/results

          if [ -f public/results_data.json ]; then
            echo "public/results_data.json exists"
          elif [ -f data/play_results.json ]; then
            echo "Copying data/play_results.json to public/results_data.json"
            cp data/play_results.json public/results_data.json
          else
            echo "Creating fallback public/results_data.json"
            python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          os.makedirs("public", exist_ok=True)

          empty_summary = {
              "picks": 0,
              "won": 0,
              "lost": 0,
              "void": 0,
              "pending": 0,
              "unknown": 0,
              "units": 0.0,
              "win_rate": None
          }

          payload = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "today": empty_summary,
              "last_7_days": empty_summary,
              "current_month": empty_summary,
              "all_time": empty_summary,
              "items": [],
              "note": "Fallback results_data.json created by workflow."
          }

          with open("public/results_data.json", "w", encoding="utf-8") as file:
              json.dump(payload, file, indent=2, ensure_ascii=False)
          PY
          fi

      - name: Build results page
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          python rss_results.py

      - name: Ensure results page exists
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          mkdir -p public/results

          if [ ! -f public/results/index.html ]; then
            echo "ERROR: public/results/index.html was not created."
            echo "Listing public directory:"
            find public -maxdepth 4 -type f | sort
            exit 1
          fi

          if [ ! -f public/results.xml ]; then
            echo "ERROR: public/results.xml was not created."
            echo "Listing public directory:"
            find public -maxdepth 4 -type f | sort
            exit 1
          fi

          if [ ! -f public/results_data.json ]; then
            echo "ERROR: public/results_data.json was not created."
            echo "Listing public directory:"
            find public -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Results page files exist."

      - name: Remove production debug artifacts
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          rm -f public/elo_debug.json || true
          rm -f public/odds_debug.json || true
          rm -f public/sportscore_debug.json || true
          rm -f public/match_debug.json || true
          rm -f public/results_debug.json || true
          rm -f public/source_audit.json || true
          rm -f public/source_manifest.json || true
          rm -f public/model_diagnostics.json || true

      - name: Verify generated public files
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          echo "=== PUBLIC FILES ==="
          find public -maxdepth 4 -type f | sort

          echo "=== REQUIRED TOP / ALL FILES ==="
          test -f public/index.html
          test -f public/all/index.html
          test -f public/tennis.xml
          test -f public/tennis_all.xml

          echo "=== REQUIRED RESULTS FILES ==="
          test -f public/results/index.html
          test -f public/results.xml
          test -f public/results_data.json

          echo "All required public files exist."

      - name: Persist play history and results data
        if: steps.prediction_window.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/play_history/*.json || true
          git add data/pick_history/all/*.json || true
          git add data/pick_history/top5/*.json || true
          git add data/play_results.json || true
          git add data/results/*.json || true
          git add public/results_data.json || true

          if git diff --cached --quiet; then
            echo "No play history or results changes to commit."
          else
            git commit -m "Update tennis play history and results [skip ci]"
            git push
          fi

      - name: Setup GitHub Pages
        if: steps.prediction_window.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: steps.prediction_window.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          name: ${{ env.PAGES_ARTIFACT_NAME }}

      - name: Deploy GitHub Pages
        if: steps.prediction_window.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
