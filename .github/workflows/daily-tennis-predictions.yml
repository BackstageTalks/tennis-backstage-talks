name: Daily Tennis Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "10 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"
  RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  X_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

jobs:
  build:
    name: Build predictions and site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install requests pandas numpy openpyxl beautifulsoup4 lxml python-dateutil pytz
          fi

      - name: Validate TennisApi key mapping
        run: |
          python - <<'PY'
          import os
          names = ["RAPIDAPI_KEY", "TENNISAPI_RAPIDAPI_KEY", "X_RAPIDAPI_KEY"]
          present = {name: bool((os.getenv(name) or '').strip()) for name in names}
          print("SECRET_MAPPING", present)
          if not any(present.values()):
              raise SystemExit("Missing RapidAPI key. Add repository secret RAPIDAPI_KEY.")
          PY

      - name: Debug dependency versions
        run: |
          python - <<'PY'
          import sys
          print('python', sys.version)
          import pandas as pd
          print('pandas', pd.__version__)
          import requests
          print('requests', requests.__version__)
          PY

      - name: Run predictions
        run: python update.py

      - name: Build pages if script exists
        run: |
          if [ -f build_pages.py ]; then
            python build_pages.py
          else
            echo "build_pages.py not found, skipping"
          fi

      - name: Ensure public marker files
        run: |
          mkdir -p public
          touch public/.nojekyll
          date -u +"%Y-%m-%d %H:%M:%S UTC" > public/.force_publish

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public data thinq/data || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "Update daily tennis predictions"
            git push
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
