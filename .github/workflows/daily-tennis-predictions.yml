name: Daily Tennis Predictions

on:
  workflow_dispatch:

  schedule:
    - cron: "0 4-22/3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tennis-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      LOCAL_TZ_OFFSET_HOURS: "2"
      BET_WINDOW_START_HOUR: "6"
      BET_WINDOW_END_NEXT_DAY_HOUR: "6"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 pandas openpyxl
          fi

      - name: Prepare folders
        run: |
          mkdir -p public
          mkdir -p public/all
          mkdir -p public/results
          mkdir -p data
          mkdir -p data/play_history

      - name: Run predictions
        run: |
          python update.py

      - name: Build TOP and ALL pages
        run: |
          if [ -f build_pages.py ]; then
            echo "Running build_pages.py"
            python build_pages.py
          elif [ -f rss.py ] && [ -f rss_all.py ]; then
            echo "Running rss.py"
            python rss.py

            echo "Running rss_all.py"
            python rss_all.py
          elif [ -f build_site.py ]; then
            echo "Running build_site.py"
            python build_site.py
          elif [ -f site_builder.py ]; then
            echo "Running site_builder.py"
            python site_builder.py
          else
            echo "ERROR: No page builder found."
            echo "Expected one of:"
            echo "- build_pages.py"
            echo "- rss.py + rss_all.py"
            echo "- build_site.py"
            echo "- site_builder.py"
            exit 1
          fi

      - name: Run results checker
        run: |
          if [ -f results_checker.py ]; then
            echo "Running results_checker.py"
            python results_checker.py
          else
            echo "results_checker.py not found, skipping results checker."
          fi

      - name: Build results page
        run: |
          if [ -f rss_results.py ]; then
            echo "Running rss_results.py"
            python rss_results.py
          else
            echo "rss_results.py not found, creating fallback results page."

            mkdir -p public/results

            cat > public/results/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>TBT Tennis Results</title>
          </head>
          <body>
          <h1>TBT Tennis Results</h1>
          <p>Results module is not available in this build.</p>
          </body>
          </html>
          EOF

            cat > public/results.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0">
          <channel>
          <title>TBT Tennis Results</title>
          <description>Results module is not available in this build.</description>
          </channel>
          </rss>
          EOF

            cat > public/results_data.json <<'EOF'
          {
            "items": [],
            "error": "rss_results.py not found"
          }
          EOF

            cat > public/results_debug.json <<'EOF'
          {
            "error": "rss_results.py not found"
          }
          EOF
          fi

      - name: Verify generated public files
        run: |
          echo "=== PUBLIC FILES ==="
          find public -maxdepth 4 -type f | sort

          echo "=== REQUIRED TOP / ALL FILES ==="

          test -f public/index.html
          test -f public/all/index.html

          echo "TOP and ALL pages exist."

          echo "=== REQUIRED RESULTS FILES ==="

          test -f public/results/index.html
          test -f public/results.xml
          test -f public/results_data.json
          test -f public/results_debug.json

          echo "Results files exist."

      - name: Persist play history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/play_history/*.json || true
          git add data/play_results.json || true

          if git diff --cached --quiet; then
            echo "No play history changes to commit."
          else
            git commit -m "Update tennis play history [skip ci]"
            git push
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
