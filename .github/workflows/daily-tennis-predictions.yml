name: Daily Tennis Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "00 04 * * *"
    - cron: "20 04 * * *"
    - cron: "40 04 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-tennis-predictions
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check project files
        run: |
          for file in             tennisapi_client.py             tennisapi_cache.py             tennisapi_set_markets.py             sets_model.py             fetch_matches.py             results_fetcher.py             results_checker.py             odds_api.py             prediction_engine_core.py             prediction_engine_top.py             render_site.py             build_pages.py             bst_ai_refresher.py             opening_odds_enricher.py             rss_results.py             fix_navigation.py
          do
            if [ -f "$file" ]; then
              python -m py_compile "$file"
            else
              echo "WARNING: $file not found, skipping syntax check"
            fi
          done

      - name: Prepare directories
        run: |
          mkdir -p public public/all public/results public/BsT
          mkdir -p data data/pick_history/all data/pick_history/top5 data/results data/marq_ai data/tennisapi_cache data/odds_history

      - name: Warm TennisApi cache
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3,6,871"
          TENNISAPI_PROVIDER_ID: "1"
          RESULTS_LOOKBACK_DAYS: "90"
          ODDS_SCAN_DAYS_AHEAD: "1"
          ODDS_SCAN_DAYS_BACK: "0"
          TOP5_MIN_ODDS: "1.30"
          TOP5_MAX_ODDS: "5.00"
          TOP5_MIN_PROBABILITY: "0.55"
          TOP5_SCORE_ODDS_CAP: "3.0"
          TOP5_BST_SOFT_BONUS: "0.10"
        run: |
          python tennisapi_cache.py

      - name: Run predictions
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3,6,871"
          TENNISAPI_PROVIDER_ID: "1"
          RESULTS_LOOKBACK_DAYS: "90"
          ODDS_SCAN_DAYS_AHEAD: "1"
          ODDS_SCAN_DAYS_BACK: "0"
          TOP5_MIN_ODDS: "1.30"
          TOP5_MAX_ODDS: "5.00"
          TOP5_MIN_PROBABILITY: "0.55"
          TOP5_SCORE_ODDS_CAP: "3.0"
          TOP5_BST_SOFT_BONUS: "0.10"
        run: |
          python update.py

      - name: Refresh BsT AI values
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
        run: |
          if [ -f bst_ai_refresher.py ]; then
            python bst_ai_refresher.py
          else
            echo "bst_ai_refresher.py not found, skipping BsT refresh"
          fi

      - name: Enrich opening odds
        run: |
          if [ -f opening_odds_enricher.py ]; then
            python opening_odds_enricher.py
          else
            echo "opening_odds_enricher.py not found, skipping opening odds enrichment"
          fi

      - name: Build TOP, ALL and BsT pages
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3,6,871"
          TENNISAPI_PROVIDER_ID: "1"
          RESULTS_LOOKBACK_DAYS: "90"
          ODDS_SCAN_DAYS_AHEAD: "1"
          ODDS_SCAN_DAYS_BACK: "0"
          TOP5_MIN_ODDS: "1.30"
          TOP5_MAX_ODDS: "5.00"
          TOP5_MIN_PROBABILITY: "0.55"
          TOP5_SCORE_ODDS_CAP: "3.0"
          TOP5_BST_SOFT_BONUS: "0.10"
        run: |
          python build_pages.py

      - name: Run results checker
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3,6,871"
          TENNISAPI_PROVIDER_ID: "1"
          RESULTS_LOOKBACK_DAYS: "90"
          ODDS_SCAN_DAYS_AHEAD: "1"
          ODDS_SCAN_DAYS_BACK: "0"
        run: |
          python results_checker.py

      - name: Build results page
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SGOAPI: ${{ secrets.SGOAPI }}
          TENNISAPI_CATEGORY_IDS: "3,6,871"
          TENNISAPI_PROVIDER_ID: "1"
          RESULTS_LOOKBACK_DAYS: "90"
        run: |
          python rss_results.py

      - name: Fix navigation and layout
        run: |
          if [ -f fix_navigation.py ]; then python fix_navigation.py; fi

      - name: Ensure pages exist
        run: |
          if [ ! -f public/index.html ]; then
            printf '%s
' '<!doctype html><html><head><meta charset="utf-8"><title>TOP5</title></head><body><h1>TOP5</h1><p>No picks available.</p></body></html>' > public/index.html
          fi
          if [ ! -f public/all/index.html ]; then
            mkdir -p public/all
            printf '%s
' '<!doctype html><html><head><meta charset="utf-8"><title>ALL</title></head><body><h1>ALL</h1><p>No picks available.</p></body></html>' > public/all/index.html
          fi
          if [ ! -f public/BsT/index.html ]; then
            mkdir -p public/BsT
            printf '%s
' '<!doctype html><html><head><meta charset="utf-8"><title>BsT</title></head><body><h1>BsT</h1><p>No BsT picks available.</p></body></html>' > public/BsT/index.html
          fi
          if [ ! -f public/results/index.html ]; then
            mkdir -p public/results
            printf '%s
' '<!doctype html><html><head><meta charset="utf-8"><title>Results</title></head><body><h1>Results</h1><p>No results available yet.</p></body></html>' > public/results/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
