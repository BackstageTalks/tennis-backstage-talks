name: Daily Tennis Predictions

on:
  workflow_dispatch:

  schedule:
    - cron: "0 4-22/3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tennis-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      LOCAL_TZ_OFFSET_HOURS: "2"
      BET_WINDOW_START_HOUR: "6"
      BET_WINDOW_END_NEXT_DAY_HOUR: "6"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 pandas openpyxl
          fi

      - name: Prepare folders
        run: |
          mkdir -p public
          mkdir -p data
          mkdir -p data/play_history

      - name: Run predictions
        run: |
          python update.py

      - name: Run results checker
        run: |
          python results_checker.py

      - name: Build TOP and ALL pages
        run: |
          if [ -f rss.py ]; then
            echo "Running rss.py"
            python rss.py
          fi

          if [ -f rss_all.py ]; then
            echo "Running rss_all.py"
            python rss_all.py
          fi

          if [ -f build_site.py ]; then
            echo "Running build_site.py"
            python build_site.py
          fi

          if [ -f site_builder.py ]; then
            echo "Running site_builder.py"
            python site_builder.py
          fi

      - name: Build results page
        run: |
          python rss_results.py

      - name: Verify generated public files
        run: |
          echo "=== PUBLIC FILES ==="
          find public -maxdepth 3 -type f | sort

          echo "=== REQUIRED RESULTS FILES ==="

          test -f public/results/index.html
          test -f public/results.xml
          test -f public/results_data.json
          test -f public/results_debug.json

      - name: Persist play history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/play_history/*.json || true
          git add data/play_results.json || true

          if git diff --cached --quiet; then
            echo "No play history changes to commit."
          else
            git commit -m "Update tennis play history [skip ci]"
            git push
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
