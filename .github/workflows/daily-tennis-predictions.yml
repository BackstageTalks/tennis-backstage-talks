name: Daily Tennis Predictions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      SGOAPI: ${{ secrets.SGOAPI }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Clean public folder
        run: |
          rm -rf public
          mkdir -p public
          mkdir -p public/all
          mkdir -p public/results

      - name: Build ELO Database
        run: |
          python -m src.elo.update_elo

      - name: Run Prediction Pipeline
        run: |
          python update.py

      - name: Build TOP Page
        run: |
          python top.py

      - name: Build ALL Page
        run: |
          python all.py

      - name: Commit ELO Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/elo

          if git diff --staged --quiet; then
            echo "No ELO changes"
          else
            git commit -m "Update ELO database"
            git push
          fi

      - name: Verify Public Folder
        run: |
          echo "===== PUBLIC CONTENT ====="
          find public -type f | sort

          echo ""
          echo "===== INDEX EXISTS ====="
          test -f public/index.html && echo "public/index.html OK" || echo "public/index.html MISSING"

          echo ""
          echo "===== ALL INDEX EXISTS ====="
          test -f public/all/index.html && echo "public/all/index.html OK" || echo "public/all/index.html MISSING"

          echo ""
          echo "===== ODDS DEBUG ====="
          cat public/odds_debug.json || true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
