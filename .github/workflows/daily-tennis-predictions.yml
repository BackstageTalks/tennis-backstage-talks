name: Daily Tennis Predictions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Clean public folder
        run: |
          rm -rf public
          mkdir -p public
          mkdir -p public/all
          mkdir -p public/results

      - name: Build ELO Database
        run: |
          python -m src.elo.update_elo

      - name: Diagnose ELO Engine Import
        run: |
          echo "===== ELO ENGINE IMPORT DIAGNOSTICS ====="

          python - <<'PY'
          import os
          import inspect
          import elo_engine

          print("elo_engine file:", getattr(elo_engine, "__file__", "NO_FILE"))
          print("working directory:", os.getcwd())

          print("has load:", hasattr(elo_engine, "load"))
          print("has predict:", hasattr(elo_engine, "predict"))
          print("has write_debug:", hasattr(elo_engine, "write_debug"))
          print("has _DEBUG:", hasattr(elo_engine, "_DEBUG"))

          print("")
          print("Calling elo_engine.load()...")
          try:
              store = elo_engine.load()
              print("elo store type:", type(store))
              print("elo store size:", len(store) if hasattr(store, "__len__") else "NO_LEN")
          except Exception as exc:
              print("elo_engine.load() failed:", exc)

          print("")
          print("public files after elo_engine.load():")
          for root, dirs, files in os.walk("public"):
              for file in files:
                  print(os.path.join(root, file))

          print("")
          print("source preview:")
          try:
              source = inspect.getsource(elo_engine)
              print(source[:2000])
          except Exception as exc:
              print("source inspect failed:", exc)
          PY

      - name: Run Prediction Pipeline
        run: |
          python update.py

      - name: Ensure debug files exist
        run: |
          mkdir -p public

          if [ ! -f public/elo_debug.json ]; then
            echo '{"status":"missing","file":"elo_debug.json","message":"elo_debug.json was not generated during prediction pipeline"}' > public/elo_debug.json
          fi

          if [ ! -f public/odds_debug.json ]; then
            echo '{"status":"missing","file":"odds_debug.json","message":"odds_debug.json was not generated during prediction pipeline"}' > public/odds_debug.json
          fi

      - name: Build TOP Page
        run: |
          python top.py

      - name: Build ALL Page
        run: |
          python all.py

      - name: Verify Public Folder
        run: |
          echo "===== PUBLIC CONTENT ====="
          find public -type f | sort

          echo ""
          echo "===== ODDS DEBUG ====="
          cat public/odds_debug.json || true

          echo ""
          echo "===== ELO DEBUG ====="
          cat public/elo_debug.json || true

          echo ""
          echo "===== INDEX EXISTS ====="
          test -f public/index.html && echo "public/index.html OK" || echo "public/index.html MISSING"

          echo ""
          echo "===== ALL INDEX EXISTS ====="
          test -f public/all/index.html && echo "public/all/index.html OK" || echo "public/all/index.html MISSING"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
