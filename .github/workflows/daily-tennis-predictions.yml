name: Daily Tennis Predictions

run-name: Daily Tennis Predictions - ${{ github.event_name }} - ${{ github.run_number }}

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Clean public folder
        run: |
          echo "===== CLEAN PUBLIC FOLDER ====="
          rm -rf public
          mkdir -p public

      - name: Run predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
          BET_WINDOW_START_HOUR: 6
          BET_WINDOW_END_NEXT_DAY_HOUR: 6
        run: python update.py

      - name: Generate TOP7 results from current predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python results_checker.py

      - name: Generate ALL results from current ALL predictions
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python results_checker_all.py

      - name: Generate source audit
        run: python audit_sources.py

      - name: Generate TOP page and TOP RSS
        run: python rss.py

      - name: Generate ALL page and ALL RSS
        run: python rss_all.py

      - name: Generate TOP7 results page and RSS
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python rss_results.py

      - name: Generate ALL results page and RSS
        env:
          LOCAL_TZ_OFFSET_HOURS: 2
        run: python rss_results_all.py

      - name: Generate link hub
        run: bash publish_links.sh

      - name: Verify generated files
        run: |
          echo "===== PUBLIC FILES ====="
          ls -R public

          echo "===== CHECK CORE PAGES ====="

          for f in \
            index.html \
            tennis.xml \
            tennis_all.xml \
            results.xml \
            all_results.xml \
            all/index.html \
            results/index.html \
            all_results/index.html \
            H4V34N1C3D4Y177/index.html
          do
            if [ ! -f "public/$f" ]; then
              echo "ERROR: public/$f missing"
              exit 1
            fi
          done

          echo "===== CHECK TOP JSON ====="
          TOP_JSON=$(ls public/predictions_*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$TOP_JSON" ]; then
            echo "WARNING: TOP predictions JSON missing"
          else
            TOP_COUNT=$(python -c "import json; print(len(json.load(open('$TOP_JSON', encoding='utf-8'))))")
            echo "TOP_JSON=$TOP_JSON"
            echo "TOP_COUNT=$TOP_COUNT"

            if [ "$TOP_COUNT" -eq 0 ]; then
              echo "WARNING: TOP predictions has 0 items. Deploy allowed."
            fi

            if [ "$TOP_COUNT" -gt 7 ]; then
              echo "ERROR: TOP predictions has more than 7 items."
              exit 1
            fi

            echo "===== TOP JSON BET TAG PREVIEW ====="
            python -c "import json, glob; files=sorted(glob.glob('public/predictions_*.json')); path=files[-1] if files else None; data=json.load(open(path, encoding='utf-8')) if path else []; print('No TOP JSON found.') if not files else None; print('File:', path) if path else None; print('Count:', len(data)); [print('#', i, '| pick:', item.get('pick'), '| opponent:', item.get('opponent'), '| probability:', item.get('probability'), '| odds:', item.get('odds'), '| ev:', item.get('ev_score'), '| bet_tag:', item.get('bet_tag'), '| reason:', item.get('short_reason')) for i, item in enumerate(data, start=1)]"
          fi

          echo "===== CHECK ALL JSON ====="
          ALL_JSON=$(ls public/all_predictions_*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$ALL_JSON" ]; then
            echo "WARNING: ALL predictions JSON missing"
          else
            ALL_COUNT=$(python -c "import json; print(len(json.load(open('$ALL_JSON', encoding='utf-8'))))")
            echo "ALL_JSON=$ALL_JSON"
            echo "ALL_COUNT=$ALL_COUNT"

            if [ "$ALL_COUNT" -eq 0 ]; then
              echo "WARNING: ALL predictions has 0 items. Deploy allowed."
            fi
          fi

          echo "===== CHECK RESULTS JSON OPTIONAL ====="
          RESULTS_JSON=$(ls public/results_*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$RESULTS_JSON" ]; then
            echo "WARNING: results_*.json missing."
          else
            echo "RESULTS_JSON=$RESULTS_JSON"
          fi

          echo "===== CHECK ALL RESULTS JSON OPTIONAL ====="
          ALL_RESULTS_JSON=$(ls public/all_results_*.json 2>/dev/null | head -n 1 || true)

          if [ -z "$ALL_RESULTS_JSON" ]; then
            echo "WARNING: all_results_*.json missing."
          else
            echo "ALL_RESULTS_JSON=$ALL_RESULTS_JSON"
          fi

          echo "===== CHECK RSS ITEM COUNTS ====="

          TOP_RSS_COUNT=$(grep -c "<item>" public/tennis.xml || true)
          echo "TOP_RSS_COUNT=$TOP_RSS_COUNT"

          if [ "$TOP_RSS_COUNT" -gt 7 ]; then
            echo "ERROR: TOP RSS has more than 7 items."
            exit 1
          fi

          ALL_RSS_COUNT=$(grep -c "<item>" public/tennis_all.xml || true)
          echo "ALL_RSS_COUNT=$ALL_RSS_COUNT"

          RESULTS_RSS_COUNT=$(grep -c "<item>" public/results.xml || true)
          echo "RESULTS_RSS_COUNT=$RESULTS_RSS_COUNT"

          ALL_RESULTS_RSS_COUNT=$(grep -c "<item>" public/all_results.xml || true)
          echo "ALL_RESULTS_RSS_COUNT=$ALL_RESULTS_RSS_COUNT"

          echo "===== LINK HUB PREVIEW ====="
          head -n 120 public/H4V34N1C3D4Y177/index.html

          echo "===== TOP PAGE PREVIEW ====="
          head -n 60 public/index.html

          echo "===== ALL PAGE PREVIEW ====="
          head -n 60 public/all/index.html

          echo "===== TOP RESULTS PAGE PREVIEW ====="
          head -n 60 public/results/index.html

          echo "===== ALL RESULTS PAGE PREVIEW ====="
          head -n 60 public/all_results/index.html

          echo "===== TOP RSS PREVIEW ====="
          head -n 80 public/tennis.xml

          echo "===== ALL RSS PREVIEW ====="
          head -n 80 public/tennis_all.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
