name: Daily Tennis Predictions

on:
  workflow_dispatch:

  schedule:
    - cron: "0 4-22/3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tennis-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      LOCAL_TZ_OFFSET_HOURS: "2"
      BET_WINDOW_START_HOUR: "6"
      BET_WINDOW_END_NEXT_DAY_HOUR: "6"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 pandas openpyxl
          fi

      - name: Prepare folders
        run: |
          mkdir -p public
          mkdir -p public/all
          mkdir -p public/results
          mkdir -p data
          mkdir -p data/play_history

      - name: Run predictions
        run: |
          python update.py

      - name: Build TOP and ALL pages
        run: |
          python build_pages.py

      - name: Run results checker
        run: |
          python results_checker.py

      - name: Force results public data files
        run: |
          mkdir -p public
          mkdir -p public/results
          mkdir -p data

          if [ -f public/results_data.json ]; then
            echo "public/results_data.json already exists"
          elif [ -f data/play_results.json ]; then
            echo "Copying data/play_results.json to public/results_data.json"
            cp data/play_results.json public/results_data.json
          else
            echo "Creating fallback public/results_data.json"
            cat > public/results_data.json <<'EOF'
          {
            "generated_at": null,
            "today": {
              "picks": 0,
              "won": 0,
              "lost": 0,
              "void": 0,
              "pending": 0,
              "unknown": 0,
              "units": 0.0,
              "win_rate": null
            },
            "last_7_days": {
              "picks": 0,
              "won": 0,
              "lost": 0,
              "void": 0,
              "pending": 0,
              "unknown": 0,
              "units": 0.0,
              "win_rate": null
            },
            "current_month": {
              "picks": 0,
              "won": 0,
              "lost": 0,
              "void": 0,
              "pending": 0,
              "unknown": 0,
              "units": 0.0,
              "win_rate": null
            },
            "all_time": {
              "picks": 0,
              "won": 0,
              "lost": 0,
              "void": 0,
              "pending": 0,
              "unknown": 0,
              "units": 0.0,
              "win_rate": null
            },
            "items": [],
            "error": "fallback results_data.json created by workflow"
          }
          EOF
          fi

          if [ -f public/results_debug.json ]; then
            echo "public/results_debug.json already exists"
          else
            echo "Creating fallback public/results_debug.json"
            cat > public/results_debug.json <<'EOF'
          {
            "provider": "workflow_fallback",
            "finished_results_found": 0,
            "resolved_count": 0,
            "pending_count": 0,
            "unknown_count": 0,
            "examples_results": [],
            "examples_resolved": [],
            "examples_unresolved": [],
            "error": "fallback results_debug.json created by workflow"
          }
          EOF
          fi

      - name: Build results page
        run: |
          python rss_results.py

      - name: Verify generated public files
        run: |
          echo "=== PUBLIC FILES ==="
          find public -maxdepth 4 -type f | sort

          echo "=== REQUIRED TOP / ALL FILES ==="
          test -f public/index.html
          test -f public/all/index.html
          test -f public/tennis.xml
          test -f public/tennis_all.xml

          echo "=== REQUIRED RESULTS FILES ==="
          test -f public/results/index.html
          test -f public/results.xml
          test -f public/results_data.json
          test -f public/results_debug.json

          echo "All required public files exist."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Persist play history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/play_history/*.json || true
          git add data/play_results.json || true

          if git diff --cached --quiet; then
            echo "No play history changes to commit."
          else
            git commit -m "Update tennis play history [skip ci]"
            git push
          fi
